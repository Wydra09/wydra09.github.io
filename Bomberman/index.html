<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gamepad robust handler — demo</title>
<style>
  :root{
    --w:900px;
    --h:560px;
    --bg:#0f1724;
    --panel:#0b1220;
    --accent:#06b6d4;
    --muted:#94a3b8;
  }
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    gap:18px;
    padding:18px;
    background:linear-gradient(180deg,#071024,#0b1220);
    color:#e6eef6;
    font-family:Inter,Segoe UI,system-ui,Arial;
    align-items:flex-start;
  }

  .wrap{
    display:flex;
    gap:18px;
    align-items:flex-start;
  }

  .game {
    width:var(--w);
    height:var(--h);
    background:linear-gradient(180deg,#071428,#0b1a2a);
    border-radius:12px;
    box-shadow:0 12px 40px rgba(2,6,23,0.6);
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  canvas {
    width:100%;
    height:100%;
    display:block;
    background:linear-gradient(180deg,#0b1a2a,#071428);
    border-radius:12px;
    outline:none;
  }

  .panel {
    width:320px;
    background:linear-gradient(180deg,#071428,#04101a);
    border-radius:10px;
    padding:12px;
    box-shadow:0 8px 24px rgba(2,6,23,0.6);
    font-size:13px;
  }

  .panel h3{ margin:6px 0 10px 0; font-size:15px; color:var(--accent) }
  .row{ display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  .btn{
    background:#071a2a;
    border:1px solid rgba(255,255,255,0.04);
    color:var(--muted);
    padding:8px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
  }
  .status {
    font-family:monospace;
    font-size:12px;
    color:#cfeefb;
    background:rgba(255,255,255,0.02);
    padding:8px;
    border-radius:8px;
    max-height:360px;
    overflow:auto;
  }
  .hint{ color:var(--muted); font-size:12px; margin-top:8px }
  .small{ font-size:12px; color:var(--muted) }
</style>
</head>
<body>
  <div class="wrap">
    <div class="game" id="gameWrap">
      <!-- Jeśli masz własny canvas, możesz go podmienić -->
      <canvas id="gameCanvas" tabindex="0" aria-label="Pole gry"></canvas>
    </div>

    <div class="panel" id="panel">
      <h3>Gamepad Debug & Handler</h3>

      <div class="row">
        <button id="btnFocus" class="btn">Ustaw fokus na grze</button>
        <button id="btnFullscreen" class="btn">Pełny ekran</button>
        <button id="btnTogglePoll" class="btn">Wyłącz polling</button>
      </div>

      <div class="row">
        <button id="btnMapReset" class="btn">Reset mapowania</button>
        <button id="btnLogClear" class="btn">Wyczyść log</button>
      </div>

      <div class="hint">Panel pokazuje aktualny stan padów i log diagnostyczny. Użyj go do testów na MiBox.</div>

      <div style="height:12px"></div>

      <div class="small">Podłączone pady:</div>
      <div id="pads" class="status" aria-live="polite"></div>

      <div style="height:10px"></div>
      <div class="small">Log:</div>
      <div id="log" class="status"></div>
    </div>
  </div>

<script>
/*
  Kompletny handler Gamepad:
  - Polling w requestAnimationFrame (stale odpytywanie)
  - Focus/visibility handling
  - Fullscreen/pointerlock uwzględnione
  - Mapowanie przycisków/osi -> akcje (przykład)
  - Diagnostyka (panel)
*/

/* ---------- Konfiguracja (dostosuj do swojej gry) ---------- */
const CONFIG = {
  pollEnabled: true,               // czy polling jest aktywny
  pollIntervalFrames: 1,           // co ile klatek odpytywać (1 = każda klatka)
  deadzone: 0.18,                  // deadzone dla osi analogowych
  axisToKeyThreshold: 0.5,         // próg traktowania osi jako "wciśnięcie"
  debugMaxLogLines: 200
};

/* ---------- Elementy DOM ---------- */
const canvas = document.getElementById('gameCanvas');
const gameWrap = document.getElementById('gameWrap');
const padsEl = document.getElementById('pads');
const logEl = document.getElementById('log');
const btnFocus = document.getElementById('btnFocus');
const btnFullscreen = document.getElementById('btnFullscreen');
const btnTogglePoll = document.getElementById('btnTogglePoll');
const btnMapReset = document.getElementById('btnMapReset');
const btnLogClear = document.getElementById('btnLogClear');

/* ---------- Prosty "silnik" gry demo (zastąp własnym) ---------- */
const ctx = canvas.getContext('2d');
let cw = canvas.width = gameWrap.clientWidth;
let ch = canvas.height = gameWrap.clientHeight;
window.addEventListener('resize', () => {
  cw = canvas.width = gameWrap.clientWidth;
  ch = canvas.height = gameWrap.clientHeight;
});

/* Przykładowe obiekty sterowane: K (klawiatura/gamepad) i M (drugi pad) */
const player = { x: 60, y: 60, w: 40, h: 40, color: '#06b6d4' };

/* Funkcja, którą wywołaj w swojej grze gdy chcesz wykonać akcję z pada:
   np. movePlayer(dx,dy), fire(), pause(), itp. */
function movePlayerBy(dx, dy) {
  player.x = Math.max(0, Math.min(cw - player.w, player.x + dx));
  player.y = Math.max(0, Math.min(ch - player.h, player.y + dy));
}

/* Rysowanie demo */
function render() {
  ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle = '#071428';
  ctx.fillRect(0,0,cw,ch);
  // siatka
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  for (let i=0;i<cw;i+=40){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,ch); ctx.stroke(); }
  for (let j=0;j<ch;j+=40){ ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(cw,j); ctx.stroke(); }

  // player
  ctx.fillStyle = player.color;
  ctx.fillRect(player.x, player.y, player.w, player.h);

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

/* ---------- Gamepad handling ---------- */

/* Mapowanie przycisków/osi -> akcje gry
   Domyślne mapowanie (możesz zmienić):
   - lewy analog / D-pad -> ruch (dx,dy)
   - przycisk 0 (A / X) -> akcja "fire"
   - przycisk 9 (Start) -> pauza / toggle menu
*/
let mapping = {
  axes: {
    leftX: 0, leftY: 1
  },
  buttons: {
    fire: 0,
    start: 9
  }
};

/* Stan poprzedni do detekcji zmian */
let prevButtons = {};
let prevAxes = {};

/* Utility: log */
function appendLog(msg){
  const time = new Date().toLocaleTimeString();
  logEl.textContent = (logEl.textContent ? logEl.textContent + '\n' : '') + `[${time}] ${msg}`;
  // trim
  const lines = logEl.textContent.split('\n');
  if (lines.length > CONFIG.debugMaxLogLines) {
    logEl.textContent = lines.slice(lines.length - CONFIG.debugMaxLogLines).join('\n');
  }
  logEl.scrollTop = logEl.scrollHeight;
}

/* Aktualizuj panel padów */
function renderPadsInfo(gpads){
  if (!gpads || gpads.length === 0) {
    padsEl.textContent = 'Brak padów';
    return;
  }
  let out = '';
